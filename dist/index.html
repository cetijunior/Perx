<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
    <meta name="theme-color" content="#F6F7F9" />
    <title>PERX — Përfitimet që dëshironi</title>
    <script>
      (() => {
        const key = 'perx-theme'
        let theme = 'light'

        try {
          const stored = localStorage.getItem(key)
          if (stored === 'light' || stored === 'dark') {
            theme = stored
          } else {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
        } catch {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }

        const root = document.documentElement
        root.classList.toggle('dark', theme === 'dark')
        root.classList.toggle('light', theme === 'light')
        root.style.colorScheme = theme

        const meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#111318' : '#F6F7F9')
      })()
    </script>
    <script type="module" crossorigin src="/assets/index-DukB_5i5.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Dn_4y8IS.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
